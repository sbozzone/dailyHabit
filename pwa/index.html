<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Disciplines" />
  <meta name="theme-color" content="#A07830" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />

  <title>Daily Disciplines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      background: #FAF8F5;
      color: #1C1A17;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 420px;
      /* Safe area: notch top + generous padding, home indicator bottom */
      padding: calc(52px + env(safe-area-inset-top)) 22px calc(80px + env(safe-area-inset-bottom));
    }

    /* Header */
    .date-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #A09880;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      line-height: 1.1;
      color: #1C1A17;
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: #8C8270;
      margin-top: 6px;
    }

    /* Progress card */
    .progress-card {
      margin: 28px 0 26px;
      background: #FFFFFF;
      border-radius: 12px;
      padding: 16px 18px;
      border: 1px solid #EAE6DF;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .progress-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #A09880;
      text-transform: uppercase;
    }
    .progress-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      color: #1C1A17;
    }
    .progress-count span {
      color: #C0B8A8;
      font-size: 16px;
      font-weight: 300;
    }
    .progress-bar {
      height: 4px;
      background: #E8E4DE;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #A07830, #4A6096);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .streak {
      margin-top: 10px;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #A07830;
      letter-spacing: 0.1em;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #E4E0D8;
      gap: 4px;
      margin-bottom: 24px;
    }
    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: #A09880;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 14px;
      transition: color 0.2s;
    }
    .tab.active {
      color: #1C1A17;
      border-bottom-color: #A07830;
    }

    /* Category cards */
    .category-card {
      border-radius: 12px;
      padding: 4px 6px 8px;
      margin-bottom: 16px;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 8px 6px;
    }
    .category-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Habit items */
    .habit-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
      border: 1px solid transparent;
      user-select: none;
    }
    .habit-item:active { background: rgba(0,0,0,0.05); }
    .habit-item.checked { opacity: 0.45; }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #C8C2B8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      font-size: 12px;
      color: #fff;
      font-weight: 700;
    }
    .habit-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: #1C1A17;
      transition: all 0.2s;
    }
    .habit-item.checked .habit-label {
      text-decoration: line-through;
      text-decoration-color: #B0A898;
      font-weight: 300;
    }

    /* Week view */
    .week-bars {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: flex-end;
    }
    .week-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .bar-count {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      color: #A09880;
    }
    .bar-count.today { color: #A07830; }
    .bar-wrap {
      width: 28px;
      height: 80px;
      background: #EDE9E3;
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .bar-fill {
      width: 100%;
      border-radius: 14px;
      transition: height 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .bar-day {
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      color: #A09880;
    }
    .bar-day.today { color: #1C1A17; font-weight: 700; }

    .week-summary {
      margin-top: 24px;
      background: #FFFFFF;
      border-radius: 10px;
      border: 1px solid #EAE6DF;
      overflow: hidden;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid #EAE6DF;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-name {
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      color: #1C1A17;
    }
    .summary-pct {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
    }

    .footer {
      margin-top: 48px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: #C0B8A8;
      text-align: center;
    }

    /* Edit mode */
    .edit-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }
    .edit-toggle {
      background: none;
      border: none;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #A09880;
      cursor: pointer;
      padding: 6px 6px;
      transition: color 0.2s;
    }
    .edit-toggle.active { color: #A07830; }

    .habit-edit {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 6px 14px;
    }
    .habit-input {
      flex: 1;
      min-width: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: #1C1A17;
      background: #FFFFFF;
      border: 1px solid #E4E0D8;
      border-radius: 8px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .habit-input:focus { border-color: #C0B8A8; }
    .habit-delete {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: none;
      color: #C0473F;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .habit-delete:active { background: rgba(192,71,63,0.12); }

    .add-habit {
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 16px);
      margin: 6px 8px 2px;
      padding: 9px 12px;
      border: 1px dashed #D8D2C8;
      border-radius: 8px;
      background: none;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: #8C8270;
      transition: border-color 0.2s, color 0.2s;
    }
    .add-habit:active { border-color: #B8B0A0; color: #6C6250; }

    .empty-state {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: #A09880;
      padding: 28px 0 8px;
      line-height: 1.6;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
<div id="app">
  <div class="date-label" id="dateLabel"></div>
  <h1>Daily Disciplines</h1>
  <div class="subtitle" id="subtitle"></div>

  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-label">Today's Progress</span>
      <span class="progress-count" id="progressCount"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="streak hidden" id="streakEl"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabToday" onclick="setView('today')">Today</button>
    <button class="tab" id="tabWeek" onclick="setView('week')">This Week</button>
  </div>

  <div id="viewToday"></div>
  <div id="viewWeek" class="hidden"></div>

  <div class="footer">Small disciplines, compounded daily.</div>
</div>

<script>
// Categories are fixed (label, icon, color). Habits live inside them and are editable.
const CATEGORIES = [
  { id: "spiritual", label: "Spiritual", icon: "✦", color: "#A07830", bg: "#FDF6E8" },
  { id: "body",      label: "Body",      icon: "◈", color: "#3A7D5E", bg: "#EDF7F2" },
  { id: "mind",      label: "Mind",      icon: "◎", color: "#4A6096", bg: "#EEF1F9" },
];

// Seed habit set, used only the first time the app runs (before any edits).
const DEFAULT_HABITS = [
  { id: "devotional", label: "Daily Devotional", cat: "spiritual" },
  { id: "bible",      label: "Read a Chapter",   cat: "spiritual" },
  { id: "pray",       label: "Pray",             cat: "spiritual" },
  { id: "walk",       label: "Walk the Dog",     cat: "body"      },
  { id: "think",      label: "Think & Reflect",  cat: "mind"      },
  { id: "journal",    label: "Journal",          cat: "mind"      },
  { id: "read",       label: "Read a Book",      cat: "mind"      },
];

function loadHabits() {
  const raw = localStorage.getItem("habitConfig");
  if (raw === null) return DEFAULT_HABITS.map(h => ({ ...h }));
  try {
    const stored = JSON.parse(raw);
    if (Array.isArray(stored)) {
      return stored
        .filter(h => h && h.id && CATEGORIES.some(c => c.id === h.cat))
        .map(h => ({ id: String(h.id), label: String(h.label || ""), cat: h.cat }));
    }
  } catch {}
  return DEFAULT_HABITS.map(h => ({ ...h }));
}
function saveHabits() {
  try { localStorage.setItem("habitConfig", JSON.stringify(habits)); } catch {}
}

let habits = loadHabits();

// Use local time for date keys (not UTC)
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function getTodayKey() { return dateKey(new Date()); }
function getDateKey(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return dateKey(d);
}

function loadData() {
  try { return JSON.parse(localStorage.getItem("habitData") || "{}"); } catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem("habitData", JSON.stringify(d)); } catch {}
}

let data = loadData();

function toggle(id) {
  if (editMode) return;
  const key = getTodayKey();
  data[key] = data[key] || {};
  data[key][id] = !data[key][id];
  saveData(data);
  render();
}

// ---- Habit editing ----
let editMode = false;
let focusId = null;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function newHabitId() {
  return "h" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function setEdit(on) {
  if (!on) {
    // Drop any half-added habits that were never named.
    habits = habits.filter(h => h.label.trim() !== "");
    saveHabits();
  }
  editMode = on;
  render();
}

function addHabit(catId) {
  const id = newHabitId();
  habits.push({ id, label: "", cat: catId });
  saveHabits();
  focusId = id;            // focus the new field after the re-render
  render();
}

function renameHabit(id, value) {
  const h = habits.find(x => x.id === id);
  if (h) { h.label = value; saveHabits(); }
  // No render() here — re-rendering would steal focus from the input mid-type.
}

function deleteHabit(id) {
  const h = habits.find(x => x.id === id);
  const name = h && h.label.trim() ? h.label : "this habit";
  if (!confirm('Delete "' + name + '"? Your past history is kept.')) return;
  habits = habits.filter(x => x.id !== id);
  saveHabits();
  render();
}

function setView(v) {
  if (v === "week" && editMode) setEdit(false);  // leave edit mode when switching away
  document.getElementById("tabToday").className = "tab" + (v === "today" ? " active" : "");
  document.getElementById("tabWeek").className  = "tab" + (v === "week"  ? " active" : "");
  document.getElementById("viewToday").className = v === "today" ? "" : "hidden";
  document.getElementById("viewWeek").className  = v === "week"  ? "" : "hidden";
}

function render() {
  const ALL_IDS      = habits.map(h => h.id);
  const todayKey     = getTodayKey();
  const todayChecked = data[todayKey] || {};
  const total        = ALL_IDS.length;
  const done         = ALL_IDS.filter(id => todayChecked[id]).length;

  document.getElementById("dateLabel").textContent =
    new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  document.getElementById("subtitle").textContent =
    done === 0    ? "Let's get started."
    : done < total ? "Keep going, you're doing great."
    :                "Every habit complete today. 🎉";

  document.getElementById("progressCount").innerHTML = done + '<span>/' + total + '</span>';
  document.getElementById("progressFill").style.width = (total > 0 ? (done / total) * 100 : 0) + "%";

  // Streak — today partial does not break streak
  let streak = 0;
  if (total > 0) {
    for (let i = 0; i < 365; i++) {
      const dd = data[getDateKey(i)] || {};
      if (ALL_IDS.filter(id => dd[id]).length === total) streak++;
      else if (i > 0) break;
    }
  }
  const streakEl = document.getElementById("streakEl");
  streakEl.textContent = "◆ " + streak + "-day streak";
  streakEl.className   = streak > 0 ? "streak" : "streak hidden";

  // Today view
  const editBar =
    '<div class="edit-bar">' +
      '<button class="edit-toggle' + (editMode ? ' active' : '') +
        '" onclick="setEdit(' + (!editMode) + ')">' +
        (editMode ? '✓ Done' : '✎ Edit') +
      '</button>' +
    '</div>';

  let bodyHtml;
  if (editMode) {
    // Edit mode: rename fields, delete buttons, and an add row per category.
    bodyHtml = CATEGORIES.map(cat => `
      <div class="category-card" style="background:${cat.bg}">
        <div class="category-header">
          <span style="color:${cat.color};font-size:13px">${cat.icon}</span>
          <span class="category-label" style="color:${cat.color}">${cat.label}</span>
        </div>
        ${habits.filter(h => h.cat === cat.id).map(item => `
          <div class="habit-edit">
            <input class="habit-input" type="text" data-id="${item.id}"
                   value="${escapeHtml(item.label)}" placeholder="Habit name"
                   oninput="renameHabit('${item.id}', this.value)" />
            <button class="habit-delete" onclick="deleteHabit('${item.id}')" aria-label="Delete habit">✕</button>
          </div>`).join('')}
        <button class="add-habit" onclick="addHabit('${cat.id}')">
          <span style="color:${cat.color};font-style:normal;font-weight:700">+</span> Add a habit
        </button>
      </div>`).join('');
  } else {
    // Normal mode: tap-to-toggle. Empty categories are hidden.
    const visibleCats = CATEGORIES.filter(cat => habits.some(h => h.cat === cat.id));
    bodyHtml = visibleCats.length === 0
      ? '<div class="empty-state">No habits yet.<br>Tap <b>✎ Edit</b> to add some.</div>'
      : visibleCats.map(cat => `
        <div class="category-card" style="background:${cat.bg}">
          <div class="category-header">
            <span style="color:${cat.color};font-size:13px">${cat.icon}</span>
            <span class="category-label" style="color:${cat.color}">${cat.label}</span>
          </div>
          ${habits.filter(h => h.cat === cat.id).map(item => {
            const checked = !!todayChecked[item.id];
            return `
              <div class="habit-item${checked ? ' checked' : ''}" onclick="toggle('${item.id}')">
                <div class="checkbox" style="${checked
                  ? `background:${cat.color};border-color:${cat.color}`
                  : `border-color:${cat.color}60`}">${checked ? '✓' : ''}</div>
                <span class="habit-label">${escapeHtml(item.label)}</span>
              </div>`;
          }).join('')}
        </div>`).join('');
  }

  document.getElementById("viewToday").innerHTML = editBar + bodyHtml;

  // After adding a habit, focus its (empty) name field.
  if (focusId) {
    const inp = document.querySelector('.habit-input[data-id="' + focusId + '"]');
    if (inp) inp.focus();
    focusId = null;
  }

  // Week view
  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const weekDays = Array.from({length: 7}, (_, i) => {
    const key = getDateKey(6 - i);
    const dd  = data[key] || {};
    const d2  = new Date(); d2.setDate(d2.getDate() - (6 - i));
    return { key, done: ALL_IDS.filter(id => dd[id]).length, total,
             dayName: dayNames[d2.getDay()], isToday: key === todayKey };
  });

  const barsHtml = weekDays.map(day => {
    const pct   = day.total > 0 ? day.done / day.total : 0;
    const h     = Math.round(pct * 80);
    const color = pct === 1 ? "#A07830" : pct > 0.5 ? "#3A7D5E" : pct > 0 ? "#4A6096" : "#D8D4CC";
    return `
      <div class="week-bar">
        <div class="bar-count${day.isToday ? ' today' : ''}">${day.done}/${day.total}</div>
        <div class="bar-wrap"><div class="bar-fill" style="height:${h}px;background:${color}"></div></div>
        <div class="bar-day${day.isToday ? ' today' : ''}">${day.dayName}</div>
      </div>`;
  }).join('');

  const summaryHtml = CATEGORIES.map(cat => {
    const items = habits.filter(h => h.cat === cat.id);
    if (items.length === 0) return '';
    const wd  = weekDays.reduce((acc, day) => acc + items.filter(it => (data[day.key]||{})[it.id]).length, 0);
    const pct = Math.round((wd / (items.length * 7)) * 100);
    return `
      <div class="summary-row">
        <div class="summary-name"><span style="color:${cat.color}">${cat.icon}</span>${cat.label}</div>
        <span class="summary-pct" style="color:${cat.color}">${pct}%</span>
      </div>`;
  }).join('');

  document.getElementById("viewWeek").innerHTML =
    `<div class="week-bars">${barsHtml}</div><div class="week-summary">${summaryHtml}</div>`;
}

render();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
